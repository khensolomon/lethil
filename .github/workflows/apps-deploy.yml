# .github/workflows/apps-deploy.yml
#
# Dispatcher for deploying static apps from apps/<name>/ to the server.
#
# Unlike server-setup.yml which calls a server-side script, this workflow
# does the work itself — because the work is generic (build → rsync) and
# the same for every app. Per-app build.py would just duplicate this
# logic in every app directory.
#
# The contract:
#   * apps/<name>/ holds the app source.
#   * If apps/<name>/package.json exists, the workflow runs
#     `npm install && npm run build` and rsyncs apps/<name>/dist/ to the
#     server.
#   * Otherwise, the workflow rsyncs apps/<name>/ directly (with the
#     usual ignores: README, .gitignore, dist).
#   * Destination on the server is /opt/apps/<name>/, except 'html'
#     which goes to /opt/apps/html (the landing-page mount).
#
# Methods:
#   ssh         — rsync to the server over SSH, reached by IP/hostname.
#   tunnel      — same rsync, but the transport is SSH-over-Cloudflare-
#                 Tunnel (cloudflared access ssh) authenticated with the
#                 Access service token. Lets the deploy run with port 22
#                 closed. Targets ssh.<ADMIN_DOMAIN>, not SERVER_HOST.
#   self-hosted — the job runs ON the server (a registered self-hosted
#                 runner), so the deploy is a local rsync with no network
#                 hop. No SSH, no tunnel, no host resolution.
#
# ssh and tunnel share one job on a GitHub-hosted runner; they differ only
# in how rsync reaches the box. self-hosted is a separate job because
# runs-on is per-job — a self-hosted method has to actually execute on the
# server, which a runner pinned to ubuntu-latest cannot do.

name: App · Deploy

on:
  workflow_dispatch:
    inputs:
      app:
        description: "Which app to deploy (must match a directory under apps/)"
        type: string
        required: true
        default: html
      method:
        description: "How to reach the server"
        type: choice
        options:
          - ssh
          - self-hosted
          - tunnel
        default: ssh
      target_host:
        description: "Target host (IP or hostname). If empty, uses SERVER_HOST secret."
        type: string
        required: false
      target_path:
        description: "Override destination path on server. If empty, uses default for this app."
        type: string
        required: false

jobs:
  # ── ssh + tunnel ─────────────────────────────────────────────────────────
  # Both reach a remote server and rsync to it; they differ only in the
  # transport rsync uses. Runs on a GitHub-hosted runner.
  deploy:
    if: github.event.inputs.method == 'ssh' || github.event.inputs.method == 'tunnel'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate app exists
        id: app
        env:
          APP: ${{ github.event.inputs.app }}
        run: |
          # Basic safety: app name must be a single directory name (no
          # slashes, no '..'). Anything else means someone is trying to
          # reach outside apps/ via the dispatch form.
          case "$APP" in
            ""|*/*|*..*|*\\*)
              echo "::error::Invalid app name: '$APP'. Must be a plain directory name under apps/."
              exit 1
              ;;
          esac
          if [ ! -d "apps/$APP" ]; then
            echo "::error::apps/$APP does not exist in this repo."
            echo "::error::Add it (and list it in config.yml) before deploying."
            exit 1
          fi
          echo "name=$APP" >> "$GITHUB_OUTPUT"
          echo "default_target=/opt/apps/$APP" >> "$GITHUB_OUTPUT"

      - name: Resolve target host
        id: target
        env:
          METHOD: ${{ github.event.inputs.method }}
          USER_HOST: ${{ github.event.inputs.target_host }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          ADMIN_DOMAIN: ${{ secrets.ADMIN_DOMAIN }}
        run: |
          if [ "$METHOD" = "tunnel" ]; then
            # The tunnel reaches the box by its public SSH hostname, not by
            # IP — that is the point of keeping port 22 closed. The hostname
            # is ssh.<admin-domain>, matching the 'ssh' admin subdomain that
            # setup.py routes through the tunnel. target_host/SERVER_HOST do
            # not apply here.
            if [ -z "$ADMIN_DOMAIN" ]; then
              echo "::error::method=tunnel needs the ADMIN_DOMAIN secret to derive ssh.<admin-domain>."
              exit 1
            fi
            host="ssh.${ADMIN_DOMAIN}"
          else
            host="$USER_HOST"
            [ -z "$host" ] && host="$SERVER_HOST"
            if [ -z "$host" ]; then
              echo "::error::No target host. Provide via form input or SERVER_HOST secret."
              exit 1
            fi
          fi
          echo "host=$host" >> "$GITHUB_OUTPUT"

      - name: Resolve target user
        id: user
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          # The account rsync/ssh authenticate as on the server. Defaults to
          # root (what setup.py provisions and the NEXT STEPS summary tests
          # against); override by setting the SERVER_USER secret.
          user="$SERVER_USER"
          [ -z "$user" ] && user="root"
          echo "user=$user" >> "$GITHUB_OUTPUT"

      - name: Resolve target path
        id: path
        env:
          USER_TARGET: ${{ github.event.inputs.target_path }}
          DEFAULT_TARGET: ${{ steps.app.outputs.default_target }}
        run: |
          path="$USER_TARGET"
          [ -z "$path" ] && path="$DEFAULT_TARGET"
          # Refuse anything that isn't an absolute /opt/... path — small
          # guard against typos that would rsync to / or $HOME.
          case "$path" in
            /opt/*) ;;
            *)
              echo "::error::Target path must start with /opt/. Got: '$path'"
              exit 1
              ;;
          esac
          echo "path=$path" >> "$GITHUB_OUTPUT"

      # ── Build step ───────────────────────────────────────────────────────
      # If the app has a package.json, treat it as a Node/npm-buildable app
      # and run its build script. The build must produce a dist/ directory.
      # Otherwise, the app is plain static files and gets rsynced as-is.
      - name: Detect build type
        id: build
        env:
          APP: ${{ steps.app.outputs.name }}
        run: |
          if [ -f "apps/$APP/package.json" ]; then
            echo "needs_build=true"  >> "$GITHUB_OUTPUT"
            echo "source_dir=apps/$APP/dist" >> "$GITHUB_OUTPUT"
          else
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            echo "source_dir=apps/$APP" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node (build apps only)
        if: steps.build.outputs.needs_build == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build the app
        if: steps.build.outputs.needs_build == 'true'
        env:
          APP: ${{ steps.app.outputs.name }}
        run: |
          cd "apps/$APP"
          npm install
          npm run build
          if [ ! -d dist ]; then
            echo "::error::npm run build did not produce a dist/ directory in apps/$APP."
            echo "::error::The build script in package.json must output to dist/."
            exit 1
          fi

      # ── Transport setup ──────────────────────────────────────────────────
      # Both ssh and tunnel authenticate to sshd with the deploy key. They
      # differ in how the TCP connection to sshd is made:
      #   ssh    → directly to the host's port 22.
      #   tunnel → through 'cloudflared access ssh' as a ProxyCommand, with
      #            the Access service token authenticating to Cloudflare's
      #            edge. sshd never sees the public internet.
      # Each step writes a single SSH_OPTS string that the rsync and verify
      # steps reuse, so those steps do not branch on method.
      - name: Set up deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: Set up transport (method=ssh)
        if: github.event.inputs.method == 'ssh'
        run: |
          if [ -n "${{ secrets.SSH_KNOWN_HOSTS }}" ]; then
            echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
            chmod 600 ~/.ssh/known_hosts
          else
            echo "::warning::SSH_KNOWN_HOSTS not set; using StrictHostKeyChecking=accept-new"
          fi
          echo "SSH_OPTS=-i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new" >> "$GITHUB_ENV"

      - name: Set up transport (method=tunnel)
        if: github.event.inputs.method == 'tunnel'
        env:
          TOKEN_ID: ${{ secrets.CF_SERVICE_TOKEN_ID }}
          TOKEN_SECRET: ${{ secrets.CF_SERVICE_TOKEN_SECRET }}
          HOST: ${{ steps.target.outputs.host }}
        run: |
          if [ -z "$TOKEN_ID" ] || [ -z "$TOKEN_SECRET" ]; then
            echo "::error::method=tunnel needs CF_SERVICE_TOKEN_ID and CF_SERVICE_TOKEN_SECRET secrets."
            echo "::error::These are the same Service Auth token setup.py attached to the SSH Access app."
            exit 1
          fi
          # Install cloudflared from Cloudflare's published .deb. The tunnel
          # transport cannot work without it on the runner.
          arch="$(dpkg --print-architecture)"
          url="https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-${arch}.deb"
          curl -fsSL -o /tmp/cloudflared.deb "$url"
          sudo dpkg -i /tmp/cloudflared.deb
          # The ProxyCommand carries the service token, so the WebSocket
          # handshake to Cloudflare's edge is authorised non-interactively by
          # the Service Auth policy. It is written into ~/.ssh/config keyed on
          # the target host rather than threaded through SSH_OPTS — the
          # command contains spaces, and putting it in SSH_OPTS would break
          # when that string is word-split into the rsync -e argument. With
          # it in the config, SSH_OPTS stays identical to the ssh method and
          # the rsync/verify steps need no per-method branching.
          # Host-key checking is accept-new: the box is only reachable through
          # the authenticated tunnel, and a pinned known_hosts would need
          # separate provisioning.
          {
            printf 'Host %s\n' "${HOST}"
            printf '  ProxyCommand cloudflared access ssh --hostname %%h --service-token-id %s --service-token-secret %s\n' "${TOKEN_ID}" "${TOKEN_SECRET}"
            printf '  StrictHostKeyChecking accept-new\n'
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config
          echo "SSH_OPTS=-i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new" >> "$GITHUB_ENV"

      # ── Deploy (ssh or tunnel) ─────────────────────────────────────────────
      - name: Rsync to server
        env:
          USER: ${{ steps.user.outputs.user }}
          HOST: ${{ steps.target.outputs.host }}
          REMOTE: ${{ steps.path.outputs.path }}
          SOURCE: ${{ steps.build.outputs.source_dir }}
        run: |
          # SSH_OPTS was set by the transport step for this method. For
          # tunnel, the ProxyCommand lives in ~/.ssh/config keyed on HOST.

          # Make sure the destination directory exists on the server. The
          # landing nginx mount is read-only from the container's side,
          # but the host path is writable as root.
          ssh $SSH_OPTS "${USER}@${HOST}" "mkdir -p '${REMOTE}'"

          # --delete: the deployed copy should be an exact mirror, so files
          #           removed from the repo get removed on the server.
          # --exclude README.md / .gitignore: source-only files, never deploy.
          # --exclude dist: skip the build output when source is the dir itself.
          # Trailing slash on SOURCE: rsync the *contents*, not the dir.
          rsync -avz --delete \
            --exclude='README.md' \
            --exclude='.gitignore' \
            --exclude='dist' \
            --exclude='node_modules' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            -e "ssh $SSH_OPTS" \
            "${SOURCE}/" "${USER}@${HOST}:${REMOTE}/"

          # nginx serves these as a non-root container user. Make sure the
          # files are world-readable so the bind mount works.
          ssh $SSH_OPTS "${USER}@${HOST}" "chmod -R a+rX '${REMOTE}'"

      - name: Verify deploy
        env:
          USER: ${{ steps.user.outputs.user }}
          HOST: ${{ steps.target.outputs.host }}
          REMOTE: ${{ steps.path.outputs.path }}
        run: |
          echo "── Contents of ${REMOTE} after deploy ──"
          ssh $SSH_OPTS "${USER}@${HOST}" "ls -la '${REMOTE}'"

  # ── self-hosted ──────────────────────────────────────────────────────────
  # The runner is registered on the target server (setup.py's NEXT STEPS
  # covers registration), so deploying is a local rsync from the checked-out
  # repo to the local path. No SSH, no tunnel, no host resolution: the job is
  # already on the box. The build logic is repeated here rather than shared
  # via an artifact — it is a few steps, and artifact round-tripping between a
  # hosted builder and the self-hosted runner would add more moving parts than
  # it removes.
  deploy-self-hosted:
    if: github.event.inputs.method == 'self-hosted'
    runs-on: [self-hosted]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate app and resolve path
        id: app
        env:
          APP: ${{ github.event.inputs.app }}
          USER_TARGET: ${{ github.event.inputs.target_path }}
        run: |
          case "$APP" in
            ""|*/*|*..*|*\\*)
              echo "::error::Invalid app name: '$APP'. Must be a plain directory name under apps/."
              exit 1
              ;;
          esac
          if [ ! -d "apps/$APP" ]; then
            echo "::error::apps/$APP does not exist in this repo."
            echo "::error::Add it (and list it in config.yml) before deploying."
            exit 1
          fi
          default_target="/opt/apps/$APP"
          path="$USER_TARGET"
          [ -z "$path" ] && path="$default_target"
          case "$path" in
            /opt/*) ;;
            *)
              echo "::error::Target path must start with /opt/. Got: '$path'"
              exit 1
              ;;
          esac
          echo "name=$APP" >> "$GITHUB_OUTPUT"
          echo "path=$path" >> "$GITHUB_OUTPUT"

      - name: Detect build type
        id: build
        env:
          APP: ${{ steps.app.outputs.name }}
        run: |
          if [ -f "apps/$APP/package.json" ]; then
            echo "needs_build=true"  >> "$GITHUB_OUTPUT"
            echo "source_dir=apps/$APP/dist" >> "$GITHUB_OUTPUT"
          else
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            echo "source_dir=apps/$APP" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node (build apps only)
        if: steps.build.outputs.needs_build == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build the app
        if: steps.build.outputs.needs_build == 'true'
        env:
          APP: ${{ steps.app.outputs.name }}
        run: |
          cd "apps/$APP"
          npm install
          npm run build
          if [ ! -d dist ]; then
            echo "::error::npm run build did not produce a dist/ directory in apps/$APP."
            echo "::error::The build script in package.json must output to dist/."
            exit 1
          fi

      - name: Rsync locally
        env:
          REMOTE: ${{ steps.app.outputs.path }}
          SOURCE: ${{ steps.build.outputs.source_dir }}
        run: |
          # The runner executes as a user that can write /opt via sudo. Same
          # mirror semantics and excludes as the remote methods; the only
          # difference is there is no -e transport — source and destination
          # are on the same machine.
          sudo mkdir -p "${REMOTE}"
          sudo rsync -av --delete \
            --exclude='README.md' \
            --exclude='.gitignore' \
            --exclude='dist' \
            --exclude='node_modules' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            "${SOURCE}/" "${REMOTE}/"
          sudo chmod -R a+rX "${REMOTE}"

      - name: Verify deploy
        env:
          REMOTE: ${{ steps.app.outputs.path }}
        run: |
          echo "── Contents of ${REMOTE} after deploy ──"
          ls -la "${REMOTE}"
