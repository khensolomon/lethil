<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Repo Documentation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Clean, modern theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>

<body>
  <div id="app">Loading documentation...</div>
  <script>
    window.$docsify = {
      name: 'Documentation',
      repo: 'https://github.com/khensolomon/lethil',
      // Sidebar Config
      loadSidebar: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md' // Prevents sidebar fallback breaking on deep links
      },
      subMaxLevel: 2, // Automatically pulls headers from setup.md into your menu
      auto2top: true,

      // Search Config fixed for subfolders
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search documentation...',
        noData: 'No results found!',
        depth: 6
      }
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>

  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>

</html>
