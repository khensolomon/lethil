<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.0/github-markdown.min.css">
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/toolbar/prism-toolbar.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-coy.min.css"
    id="prism-theme">

  <style>
    /* --- Theming System --- */
    :root {
      --bg-color: #f6f8fa;
      --surface-color: #ffffff;
      --primary-color: #0969da;
      --primary-hover: #0366d6;
      --text-main: #24292f;
      --text-muted: #57606a;
      --border-color: #d0d7de;
      --sidebar-width: 280px;
      --transition-speed: 0.35s;
      --shadow-lg: -5px 0 25px rgba(0, 0, 0, 0.08);
    }

    [data-theme="dark"] {
      --bg-color: #0d1117;
      --surface-color: #161b22;
      --primary-color: #58a6ff;
      --primary-hover: #79c0ff;
      --text-main: #c9d1d9;
      --text-muted: #8b949e;
      --border-color: #30363d;
      --shadow-lg: -5px 0 25px rgba(0, 0, 0, 0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      /* The body acts as the static background for the sidebar */
      background-color: var(--surface-color);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text-main);
      overflow-x: hidden;
      /* Prevents horizontal scroll during animation */
    }

    /* --- Mechanics --- */
    #sidebar-toggle {
      display: none;
    }

    /* --- Base Sidebar (Fixed Underneath) --- */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--sidebar-width);
      height: 100vh;
      background: var(--surface-color);
      padding: 24px;
      z-index: 1;
      /* Sits beneath the main page */
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Brand/Top Area */
    .sidebar-header {
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .brand-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text-main);
    }

    /* Theme Switcher */
    .theme-switcher {
      display: flex;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      overflow: hidden;
    }

    .theme-btn {
      flex: 1;
      background: transparent;
      border: none;
      padding: 6px 0;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .theme-btn.active {
      background: var(--primary-color);
      color: #ffffff;
    }

    /* Navigation */
    nav {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    nav a {
      color: var(--text-main);
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 6px;
      font-weight: 500;
      font-size: 14px;
      transition: background-color 0.2s;
    }

    nav a:hover {
      background-color: var(--bg-color);
    }

    nav a.active {
      color: var(--primary-color);
      background-color: var(--bg-color);
      border-left: 3px solid var(--primary-color);
      border-radius: 0 6px 6px 0;
    }

    /* --- Main Page Wrapper (The Layer that Moves) --- */
    .page-wrapper {
      position: relative;
      z-index: 2;
      /* Sits on top of the sidebar */
      min-height: 100vh;
      background-color: var(--bg-color);
      transition: transform var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-lg);
    }

    /* The "Push Under" Action */
    #sidebar-toggle:checked~.page-wrapper {
      transform: translateX(var(--sidebar-width));
    }

    /* Dim overlay for closing */
    .page-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.2);
      z-index: 150;
      opacity: 0;
      visibility: hidden;
      cursor: pointer;
      transition: opacity var(--transition-speed);
    }

    #sidebar-toggle:checked~.page-wrapper .page-backdrop {
      opacity: 1;
      visibility: visible;
    }

    /* --- Header Layer --- */
    header {
      position: sticky;
      /* Moves natively with the wrapper */
      top: 0;
      height: 70px;
      background: var(--surface-color);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 100;
    }

    .menu-btn {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      width: 22px;
      height: 16px;
      cursor: pointer;
    }

    .menu-btn span {
      display: block;
      height: 2px;
      width: 100%;
      background-color: var(--text-main);
      border-radius: 2px;
      transition: transform var(--transition-speed), opacity var(--transition-speed);
    }

    #sidebar-toggle:checked~.page-wrapper .menu-btn span:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }

    #sidebar-toggle:checked~.page-wrapper .menu-btn span:nth-child(2) {
      opacity: 0;
    }

    #sidebar-toggle:checked~.page-wrapper .menu-btn span:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    /* --- Search Engine UI --- */
    .search-container {
      position: relative;
      flex: 1;
      max-width: 400px;
      margin-left: 24px;
    }

    #search-input {
      width: 100%;
      padding: 8px 18px;
      font-size: 14px;
      color: var(--text-main);
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      transition: all 0.2s;
    }

    #search-input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.15);
    }

    .search-results-list {
      position: absolute;
      top: calc(100% + 12px);
      left: 0;
      width: 100%;
      min-width: 300px;
      max-height: 400px;
      overflow-y: auto;
      background: var(--surface-color);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 8px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      list-style: none;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all 0.2s;
      z-index: 110;
    }

    .search-results-list.has-results {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .search-results-list a {
      display: block;
      padding: 10px 14px;
      text-decoration: none;
      color: var(--text-main);
      border-radius: 6px;
    }

    .search-results-list a:hover {
      background-color: var(--bg-color);
    }

    .result-title {
      font-weight: 600;
      color: var(--primary-color);
      display: block;
      font-size: 14px;
    }

    .result-snippet {
      font-size: 12px;
      color: var(--text-muted);
      display: block;
      margin-top: 4px;
    }

    mark {
      background-color: rgba(255, 216, 89, 0.4);
      color: var(--text-main);
      padding: 0 2px;
      border-radius: 3px;
    }

    /* --- Content Layout --- */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 80px 24px;
    }

    /* Adjust GitHub Markdown background to transparent to inherit our theme */
    .markdown-body {
      background-color: transparent !important;
    }
  </style>
</head>

<body>

  <input type="checkbox" id="sidebar-toggle">

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand-title">Documentation</div>
      <div class="theme-switcher">
        <button class="theme-btn active" data-mode="auto">Auto</button>
        <button class="theme-btn" data-mode="light">Light</button>
        <button class="theme-btn" data-mode="dark">Dark</button>
      </div>
    </div>
    <nav>
      <a href="{{ '/' | relative_url }}" class="{% if page.url == '/' %}active{% endif %}">Home</a>
      <a href="{{ '/setup.html' | relative_url }}" class="{% if page.url == '/setup.html' %}active{% endif %}">Setup</a>
      <a href="{{ '/instructions.html' | relative_url }}"
        class="{% if page.url == '/instructions.html' %}active{% endif %}">Instructions</a>
      <a href="{{ '/summary.html' | relative_url }}"
        class="{% if page.url == '/summary.html' %}active{% endif %}">Summary</a>
      <a href="{{ '/description.html' | relative_url }}"
        class="{% if page.url == '/description.html' %}active{% endif %}">Description</a>
    </nav>
  </aside>

  <div class="page-wrapper">
    <label for="sidebar-toggle" class="page-backdrop"></label>

    <header>
      <label for="sidebar-toggle" class="menu-btn">
        <span></span>
        <span></span>
        <span></span>
      </label>

      <div class="search-container">
        <input type="text" id="search-input" placeholder="Search pages...">
        <ul id="search-results" class="search-results-list"></ul>
      </div>
    </header>

    <main class="markdown-body">
      {{ content }}
    </main>
  </div>

  <script>
    // --- Theming Logic ---
    const themeBtns = document.querySelectorAll('.theme-btn');
    const prismTheme = document.getElementById('prism-theme');

    function setTheme(mode) {
      // Manage buttons
      themeBtns.forEach(btn => btn.classList.remove('active'));
      document.querySelector(`[data-mode="${mode}"]`).classList.add('active');

      // Save preference
      localStorage.setItem('theme-pref', mode);

      // Evaluate 'Auto' mode
      let activeMode = mode;
      if (mode === 'auto') {
        activeMode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      // Apply to HTML and GitHub Markdown data attribute
      if (activeMode === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.documentElement.setAttribute('data-color-mode', 'dark');
        prismTheme.href = "https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-twilight.min.css"; // Dark code blocks
      } else {
        document.documentElement.removeAttribute('data-theme');
        document.documentElement.setAttribute('data-color-mode', 'light');
        prismTheme.href = "https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-coy.min.css"; // Light code blocks
      }
    }

    // Initialize Theme
    const savedTheme = localStorage.getItem('theme-pref') || 'auto';
    setTheme(savedTheme);

    themeBtns.forEach(btn => {
      btn.addEventListener('click', () => setTheme(btn.dataset.mode));
    });

    // Listen for OS auto changes
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (localStorage.getItem('theme-pref') === 'auto') {
        setTheme('auto');
      }
    });

    // --- Search Engine ---
    async function initSearch() {
      const input = document.getElementById('search-input');
      const resultsContainer = document.getElementById('search-results');
      if (!input || !resultsContainer) return;

      try {
        const response = await fetch("{{ '/search.json' | relative_url }}");
        const searchIndex = await response.json();

        input.addEventListener('input', (e) => {
          const query = e.target.value.toLowerCase().trim();
          resultsContainer.innerHTML = '';

          if (query.length < 2) {
            resultsContainer.classList.remove('has-results');
            return;
          }

          const matches = searchIndex.filter(page => {
            const title = page.title ? page.title.toLowerCase() : '';
            const content = page.content ? page.content.toLowerCase() : '';
            return title.includes(query) || content.includes(query);
          });

          resultsContainer.classList.add('has-results');

          if (matches.length === 0) {
            resultsContainer.innerHTML = '<li style="padding:16px;text-align:center;color:var(--text-muted)">No results found</li>';
            return;
          }

          matches.forEach(page => {
            const li = document.createElement('li');

            let snippet = page.content || '';
            const idx = snippet.toLowerCase().indexOf(query);
            if (idx !== -1) {
              const start = Math.max(0, idx - 30);
              const end = Math.min(snippet.length, idx + 60);
              snippet = (start > 0 ? '...' : '') + snippet.slice(start, end) + (end < snippet.length ? '...' : '');
            } else {
              snippet = snippet.slice(0, 80) + '...';
            }

            const regex = new RegExp(`(${query})`, 'gi');
            const highlightedTitle = (page.title || 'Untitled Page').replace(regex, '<mark>$1</mark>');
            const highlightedSnippet = snippet.replace(regex, '<mark>$1</mark>');

            li.innerHTML = `
              <a href="${page.url}">
                <span class="result-title">${highlightedTitle}</span>
                <span class="result-snippet">${highlightedSnippet}</span>
              </a>
            `;
            resultsContainer.appendChild(li);
          });
        });

        // Close search on click away or ESC
        document.addEventListener('click', (e) => {
          if (!e.target.closest('.search-container')) {
            resultsContainer.classList.remove('has-results');
          }
        });
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') {
            resultsContainer.classList.remove('has-results');
            input.blur();
          }
        });

      } catch (err) {
        console.error("Search failed:", err);
      }
    }
    initSearch();
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/toolbar/prism-toolbar.min.js"></script>
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/copy-to-clipboard/prism-copy-to-clipboard.min.js"></script>
</body>

</html>
