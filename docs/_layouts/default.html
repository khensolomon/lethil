<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.0/github-markdown.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css"
    id="prism-theme">
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/toolbar/prism-toolbar.min.css">

  <style>
    /* --- Theming System --- */
    :root {
      --bg-color: #fff;
      --surface-color: #f6f8fa;
      /* Soft contrast background */
      --primary-color: #0969da;
      --primary-hover: #0366d6;
      --text-main: #24292f;
      --text-muted: #57606a;
      --border-color: #d0d7de;
      --sidebar-width: 280px;
      --transition-speed: 0.35s;
    }

    [data-theme="dark"] {
      --bg-color: #0d1117;
      --surface-color: #161b22;
      --primary-color: #58a6ff;
      --primary-hover: #79c0ff;
      --text-main: #c9d1d9;
      --text-muted: #8b949e;
      --border-color: #30363d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--surface-color);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text-main);
      overflow-x: hidden;
    }

    #sidebar-toggle {
      display: none;
    }

    /* --- Base Sidebar --- */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--sidebar-width);
      height: 100vh;
      background: var(--surface-color);
      z-index: 1;
      display: flex;
      flex-direction: column;
      box-shadow: inset -20px 0px 12px -20px rgba(0, 0, 0, 0.3);
    }

    .sidebar-header {
      height: 71px;
      display: flex;
      align-items: center;
      padding: 0 24px;
    }

    .brand-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-main);
    }

    /* Navigation */
    .sidebar nav {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .sidebar nav a {
      color: var(--text-main);
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 6px;
      font-weight: 500;
      font-size: 14px;
      transition: background-color 0.2s;
    }

    .sidebar nav a:hover {
      background-color: var(--bg-color);
    }

    .sidebar nav a.active {
      color: var(--primary-color);
      background-color: var(--bg-color);
      border-left: 3px solid var(--primary-color);
      border-radius: 0 6px 6px 0;
    }

    /* Sidebar Footer (Repo Links) */
    .sidebar-footer {
      margin-top: auto;
      padding: 24px;
      border-top: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .repo-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .repo-link:hover {
      color: var(--primary-color);
    }

    .repo-link svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .repo-stats {
      display: flex;
      gap: 16px;
      margin-top: 8px;
      padding-top: 12px;
      border-top: 1px dashed var(--border-color);
    }

    .repo-stat-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .repo-stat-item svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    /* --- Main Page Wrapper Layer --- */
    .page-wrapper {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      width: 100%;
      background-color: var(--bg-color);
      transition: transform var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1), margin-left var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1), width var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
    }

    #sidebar-toggle:checked~.page-wrapper {
      transform: translateX(var(--sidebar-width));
    }

    @media (min-width: 1024px) {
      #sidebar-toggle:checked~.page-wrapper {
        transform: none;
        margin-left: var(--sidebar-width);
        width: calc(100% - var(--sidebar-width));
      }
    }

    .page-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.2);
      z-index: 150;
      opacity: 0;
      visibility: hidden;
      cursor: pointer;
      transition: opacity var(--transition-speed);
    }

    /* --- Dynamic Header Layout --- */
    header {
      position: sticky;
      top: 0;
      height: 70px;
      background: var(--bg-color);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 100;
      transition: box-shadow 0.3s ease, border-color 0.3s ease;
    }

    /* Activated via JS on Scroll */
    header.header-scrolled {
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      border-bottom-color: transparent;
    }

    .menu-btn {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      width: 22px;
      height: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .menu-btn span {
      display: block;
      height: 3px;
      width: 100%;
      background-color: var(--text-main);
      border-radius: 2px;
      transition: transform var(--transition-speed), opacity var(--transition-speed);
    }

    #sidebar-toggle:checked~.page-wrapper .menu-btn span:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }

    #sidebar-toggle:checked~.page-wrapper .menu-btn span:nth-child(2) {
      opacity: 0;
    }

    #sidebar-toggle:checked~.page-wrapper .menu-btn span:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    /* --- Unified Search Widget (Desktop) --- */
    .search-container {
      position: relative;
      flex: 1;
      max-width: 360px;
      margin-left: 20px;
      height: 38px;
    }

    .search-widget {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background: var(--surface-color);
      /* Matches sidebar for a tool-like feel */
      border: 1px solid var(--border-color);
      border-radius: 8px;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Elevated Unified State */
    .search-container.search-active .search-widget {
      background: var(--bg-color);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      border-radius: 12px;
      z-index: 120;
    }

    .search-input-wrapper {
      display: flex;
      align-items: center;
      height: 36px;
      width: 100%;
    }

    #search-cancel {
      display: none;
    }

    #search-input {
      flex: 1;
      height: 100%;
      padding: 0 16px;
      font-size: 14px;
      color: var(--text-main);
      background: transparent;
      border: none;
      outline: none;
    }

    /* Refined Native Result Dropdown */
    .search-results-list {
      display: none;
      max-height: 400px;
      overflow-y: auto;
      overflow-x: hidden;
      border-top: 1px solid var(--border-color);
      list-style: none;
      padding: 0;
      /* Removed margin/padding for edge-to-edge native look */
    }

    .search-container.search-active .search-results-list.has-results {
      display: block;
    }

    .search-results-list::-webkit-scrollbar {
      width: 6px;
    }

    .search-results-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .search-results-list::-webkit-scrollbar-thumb {
      background-color: var(--border-color);
      border-radius: 10px;
    }

    .search-results-list a {
      display: block;
      padding: 12px 16px;
      text-decoration: none;
      color: var(--text-main);
      border-bottom: 1px solid var(--border-color);
      /* Native separator lines */
      transition: background-color 0.15s;
    }

    .search-results-list li:last-child a {
      border-bottom: none;
    }

    .search-results-list a:hover {
      background-color: rgba(0, 0, 0, 0.03);
    }

    /* Subtle hover */

    [data-theme="dark"] .search-results-list a:hover {
      background-color: rgba(255, 255, 255, 0.05);
    }

    .result-title {
      font-weight: 600;
      color: var(--primary-color);
      display: block;
      font-size: 14px;
    }

    .result-snippet {
      font-size: 12px;
      color: var(--text-muted);
      display: block;
      margin-top: 4px;
    }

    mark.search-highlight {
      background-color: rgba(255, 216, 89, 0.4);
      color: var(--text-main);
      padding: 0 2px;
      border-radius: 3px;
    }

    /* --- Theme Switcher Pill (Far Right Desktop) --- */
    .theme-switcher {
      display: flex;
      background: var(--surface-color);
      border-radius: 7px;
      padding: 2px;
      gap: 1px;
      margin-left: auto;
      flex-shrink: 0;
      border: 1px solid var(--border-color);
    }

    .theme-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      width: 26px;
      height: 26px;
      border-radius: 5px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .theme-btn svg {
      width: 14px;
      height: 14px;
    }

    .theme-btn:hover {
      color: var(--text-main);
    }

    .theme-btn.active {
      background: var(--bg-color);
      color: var(--primary-color);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
    }

    /* --- Content Area Layout --- */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 80px 24px;
    }

    .markdown-body {
      background-color: transparent !important;
    }

    pre[class*="language-"] {
      box-shadow: none !important;
      border: 1px solid var(--border-color) !important;
      background-color: var(--surface-color) !important;
      border-radius: 6px !important;
    }

    .scroll-target {
      background-color: #fef08a;
      color: #854d0e;
      padding: 0.1em 0.2em;
      border-radius: 3px;
      animation: pulse-highlight 2.5s ease-out;
    }

    @keyframes pulse-highlight {
      0% {
        box-shadow: 0 0 0 0 rgba(254, 240, 138, 0.8);
      }

      70% {
        box-shadow: 0 0 0 10px rgba(254, 240, 138, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(254, 240, 138, 0);
      }
    }

    /* --- Responsiveness Adjustments --- */
    @media (max-width: 1023px) {
      #sidebar-toggle:checked~.page-wrapper .page-backdrop {
        opacity: 1;
        visibility: visible;
      }
    }

    @media (max-width: 768px) {
      .sidebar {
        box-shadow: inset -18px 0px 12px -18px rgba(0, 0, 0, 0.5);
      }

      .header-theme-switcher {
        display: none;
      }

      /* Mobile Theme Switcher: Full-width Segmented Control */
      .sidebar-theme-switcher {
        display: flex;
        width: 100%;
        background: var(--bg-color);
        margin-bottom: 16px;
        padding: 4px;
        border-radius: 8px;
        justify-content: space-between;
      }

      .sidebar-theme-switcher .theme-btn {
        flex: 1;
        /* Equal width buttons */
        height: 32px;
        border-radius: 6px;
      }

      /* Mobile Full-Screen Takeover for Search */
      .search-container {
        margin-left: 12px;
        height: 36px;
      }

      .search-container.search-active {
        position: fixed;
        inset: 0;
        z-index: 999;
        margin: 0;
        max-width: 100%;
        height: 100dvh;
        background: var(--bg-color);
      }

      .search-container.search-active .search-widget {
        position: relative;
        flex: 1;
        border: none;
        border-radius: 0;
        box-shadow: none;
        background: transparent;
      }

      .search-container.search-active .search-input-wrapper {
        height: 64px;
        border-bottom: 1px solid var(--border-color);
        padding: 0 16px;
        background: var(--bg-color);
      }

      .search-container.search-active #search-cancel {
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: none;
        color: var(--text-main);
        padding: 8px;
        margin-right: 8px;
        cursor: pointer;
      }

      .search-container.search-active #search-cancel svg {
        width: 22px;
        height: 22px;
      }

      .search-container.search-active #search-input {
        font-size: 16px;
        padding: 0 4px;
      }

      .search-container.search-active .search-results-list {
        max-height: none;
        flex: 1;
        border-top: none;
      }
    }

    @media (min-width: 769px) {
      .sidebar-theme-switcher {
        display: none;
      }
    }
  </style>
</head>

<body>

  <input type="checkbox" id="sidebar-toggle">

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand-title">Docs</div>
    </div>

    <nav>
      <a href="{{ '/' | relative_url }}" class="{% if page.url == '/' %}active{% endif %}">Home</a>
      <a href="{{ '/secrets.html' | relative_url }}"
        class="{% if page.url == '/secrets.html' %}active{% endif %}">Secrets</a>
      <a href="{{ '/setup.html' | relative_url }}" class="{% if page.url == '/setup.html' %}active{% endif %}">Setup</a>
      <a href="{{ '/instructions.html' | relative_url }}"
        class="{% if page.url == '/instructions.html' %}active{% endif %}">Instructions</a>
      <a href="{{ '/summary.html' | relative_url }}"
        class="{% if page.url == '/summary.html' %}active{% endif %}">Summary</a>
      <a href="{{ '/description.html' | relative_url }}"
        class="{% if page.url == '/description.html' %}active{% endif %}">Description</a>
    </nav>

    <div class="sidebar-footer">
      <!-- Redesigned Mobile Theme Switcher inside Sidebar -->
      <div class="theme-switcher sidebar-theme-switcher">
        <button class="theme-btn active" data-mode="auto" title="System Default"><svg viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
            <line x1="8" y1="21" x2="16" y2="21"></line>
            <line x1="12" y1="17" x2="12" y2="21"></line>
          </svg></button>
        <button class="theme-btn" data-mode="light" title="Light Mode"><svg viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg></button>
        <button class="theme-btn" data-mode="dark" title="Dark Mode"><svg viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg></button>
      </div>

      <a href="https://github.com/khensolomon/lethil" class="repo-link"><svg viewBox="0 0 16 16">
          <path fill-rule="evenodd"
            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z">
          </path>
        </svg>Source</a>
      <a href="https://github.com/khensolomon/lethil/issues" class="repo-link"><svg viewBox="0 0 16 16">
          <path fill-rule="evenodd"
            d="M8 1.5a6.5 6.5 0 100 13 6.5 6.5 0 000-13zM0 8a8 8 0 1116 0A8 8 0 010 8zm9 3a1 1 0 11-2 0 1 1 0 012 0zm-.25-6.25a.75.75 0 00-1.5 0v3.5a.75.75 0 001.5 0v-3.5z">
          </path>
        </svg>Issue</a>
      <div class="repo-stats">
        <div class="repo-stat-item" title="Stars"><svg viewBox="0 0 16 16">
            <path fill-rule="evenodd"
              d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z">

            <path fill-rule="evenodd"
              d="M5 3.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm0 2.122a2.25 2.25 0 10-1.5 0v3.256a2.25 2.25 0 101.5 0V5.372zm3.141 5.03l.859-1.258a.25.25 0 00-.207-.394H6.251a.75.75 0 010-1.5h2.542a1.75 1.75 0 011.448 2.763l-.86 1.258a.25.25 0 00.208.394h2.162a.75.75 0 010 1.5H9.589a1.75 1.75 0 01-1.448-2.763zM14 3.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0z">
            </path>
          </svg><span id="fork-count">--</span></div>
      </div>
    </div>
  </aside>

  <div class="page-wrapper">
    <label for="sidebar-toggle" class="page-backdrop"></label>

    <!-- Target the header for JS scroll shadow -->
    <header id="main-header">
      <label for="sidebar-toggle" class="menu-btn"><span></span><span></span><span></span></label>

      <div class="search-container" id="search-container">
        <div class="search-widget">
          <div class="search-input-wrapper">
            <button id="search-cancel" aria-label="Close search">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
              </svg>
            </button>
            <input type="text" id="search-input" placeholder="Search pages..." autocomplete="off">
          </div>
          <ul id="search-results" class="search-results-list"></ul>
        </div>
      </div>

      <div class="theme-switcher header-theme-switcher">
        <button class="theme-btn active" data-mode="auto" title="System Default"><svg viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
            <line x1="8" y1="21" x2="16" y2="21"></line>
            <line x1="12" y1="17" x2="12" y2="21"></line>
          </svg></button>
        <button class="theme-btn" data-mode="light" title="Light Mode"><svg viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg></button>
        <button class="theme-btn" data-mode="dark" title="Dark Mode"><svg viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg></button>
      </div>
    </header>

    <main class="markdown-body">
      {{ content }}
    </main>
  </div>

  <script>
    // --- 1. Header Scroll Shadow & Theme Setup ---
    document.addEventListener("DOMContentLoaded", () => {
      const header = document.getElementById('main-header');
      window.addEventListener('scroll', () => {
        if (window.scrollY > 10) header.classList.add('header-scrolled');
        else header.classList.remove('header-scrolled');
      });
    });

    const themeBtns = document.querySelectorAll('.theme-btn');
    const prismTheme = document.getElementById('prism-theme');

    function setTheme(mode) {
      themeBtns.forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll(`[data-mode="${mode}"]`).forEach(btn => btn.classList.add('active'));
      localStorage.setItem('theme-pref', mode);

      let activeMode = mode;
      if (mode === 'auto') {
        activeMode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      if (activeMode === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.documentElement.setAttribute('data-color-mode', 'dark');
        if (prismTheme) prismTheme.href = "https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css";
      } else {
        document.documentElement.removeAttribute('data-theme');
        document.documentElement.setAttribute('data-color-mode', 'light');
        if (prismTheme) prismTheme.href = "https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css";
      }
    }

    const savedTheme = localStorage.getItem('theme-pref') || 'auto';
    setTheme(savedTheme);

    themeBtns.forEach(btn => {
      btn.addEventListener('click', () => setTheme(btn.dataset.mode));
    });

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (localStorage.getItem('theme-pref') === 'auto') setTheme('auto');
    });

    async function fetchRepoStats() {
      try {
        const response = await fetch('https://api.github.com/repos/khensolomon/lethil');
        const data = await response.json();
        if (data.stargazers_count !== undefined) {
          document.getElementById('star-count').textContent = data.stargazers_count > 999 ? (data.stargazers_count / 1000).toFixed(1) + 'k' : data.stargazers_count;
          document.getElementById('fork-count').textContent = data.forks_count;
        }
      } catch (e) { console.warn("Failed to fetch live stats") }
    }
    fetchRepoStats();


    // --- 2. Persistent Search Engine ---
    async function initSearch() {
      const container = document.getElementById('search-container');
      const input = document.getElementById('search-input');
      const cancelBtn = document.getElementById('search-cancel');
      const resultsContainer = document.getElementById('search-results');
      if (!input || !resultsContainer) return;

      const closeSearch = () => {
        container.classList.remove('search-active');
        // Clear value when explicitly canceling to reset UX on mobile
        input.value = '';
        sessionStorage.removeItem('lastSearchQuery');
        resultsContainer.innerHTML = '';
        resultsContainer.classList.remove('has-results');
        input.blur();
      };

      if (cancelBtn) cancelBtn.addEventListener('click', closeSearch);

      try {
        const response = await fetch("{{ '/search.json' | relative_url }}");
        const searchIndex = await response.json();

        // Load Persistent Search Term
        const savedQuery = sessionStorage.getItem('lastSearchQuery') || '';
        if (savedQuery) input.value = savedQuery;

        // Expanding input on focus and re-triggering logic if query exists
        input.addEventListener('focus', () => {
          container.classList.add('search-active');
          if (input.value.trim().length >= 2) {
            input.dispatchEvent(new Event('input')); // instantly show remembered results
          }
        });

        input.addEventListener('input', (e) => {
          const query = e.target.value.toLowerCase().trim();
          sessionStorage.setItem('lastSearchQuery', query); // Persist term
          resultsContainer.innerHTML = '';
          container.classList.add('search-active');

          if (query.length < 2) {
            resultsContainer.classList.remove('has-results');
            return;
          }

          const matches = searchIndex.filter(page => {
            const title = page.title ? page.title.toLowerCase() : '';
            const content = page.content ? page.content.toLowerCase() : '';
            return title.includes(query) || content.includes(query);
          });

          resultsContainer.classList.add('has-results');

          if (matches.length === 0) {
            resultsContainer.innerHTML = '<li style="padding:16px;text-align:center;color:var(--text-muted);font-size:14px;">No results found</li>';
            return;
          }

          matches.forEach(page => {
            const li = document.createElement('li');
            let snippet = page.content || '';
            const idx = snippet.toLowerCase().indexOf(query);
            if (idx !== -1) {
              const start = Math.max(0, idx - 30);
              const end = Math.min(snippet.length, idx + 60);
              snippet = (start > 0 ? '...' : '') + snippet.slice(start, end) + (end < snippet.length ? '...' : '');
            } else {
              snippet = snippet.slice(0, 80) + '...';
            }

            const regex = new RegExp(`(${query})`, 'gi');
            const highlightedTitle = (page.title || 'Untitled Page').replace(regex, '<mark class="search-highlight">$1</mark>');
            const highlightedSnippet = snippet.replace(regex, '<mark class="search-highlight">$1</mark>');

            li.innerHTML = `
              <a href="${page.url}?highlight=${encodeURIComponent(query)}">
                <span class="result-title">${highlightedTitle}</span>
                <span class="result-snippet">${highlightedSnippet}</span>
              </a>
            `;
            resultsContainer.appendChild(li);
          });
        });

        // Click outside the unified widget dismisses the list, keeps term
        document.addEventListener('click', (e) => {
          if (!e.target.closest('.search-container')) {
            container.classList.remove('search-active');
            resultsContainer.classList.remove('has-results');
          }
        });

        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') closeSearch();
        });
      } catch (err) {
        console.error("Search failed:", err);
      }
    }
    initSearch();

    document.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const query = params.get('highlight');
      if (query) {
        const content = document.querySelector('.markdown-body');
        if (!content) return;

        const regex = new RegExp(`(${query})`, 'gi');
        const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT, null, false);
        const nodesToReplace = [];
        let n;

        while ((n = walker.nextNode())) {
          if (n.parentElement && ['SCRIPT', 'STYLE', 'CODE'].includes(n.parentElement.tagName)) continue;
          if (regex.test(n.nodeValue)) nodesToReplace.push(n);
        }

        let firstMatch = null;
        nodesToReplace.forEach(node => {
          const span = document.createElement('span');
          span.innerHTML = node.nodeValue.replace(regex, '<mark class="scroll-target">$1</mark>');
          node.parentNode.replaceChild(span, node);
          if (!firstMatch) firstMatch = span.querySelector('.scroll-target');
        });

        if (firstMatch) {
          setTimeout(() => {
            firstMatch.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }, 150);
        }
      }
    });
  </script>
