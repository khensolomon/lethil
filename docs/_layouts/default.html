<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-coy.min.css">
  <style>
    :root {
      --bg-color: #f8fafc;
      --surface-color: #ffffff;
      --primary-color: #3b82f6;
      --primary-hover: #2563eb;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --sidebar-width: 280px;
      --transition-speed: 0.3s;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      color: var(--text-main);
      line-height: 1.6;
      padding-top: 70px;
      overflow-x: hidden;
    }

    /* Fixed Header Layer */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: var(--surface-color);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }

    /* --- Pure CSS Sidebar Mechanics --- */
    #sidebar-toggle {
      display: none;
    }

    /* Hamburger Button */
    .menu-btn {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      width: 24px;
      height: 18px;
      cursor: pointer;
      z-index: 210;
      /* Must stay above the sidebar so we can close it */
      position: relative;
    }

    .menu-btn span {
      display: block;
      height: 2px;
      width: 100%;
      background-color: var(--text-main);
      border-radius: 2px;
      transition: transform var(--transition-speed), opacity var(--transition-speed);
    }

    /* Animate Hamburger to X */
    #sidebar-toggle:checked~header .menu-btn span:nth-child(1) {
      transform: translateY(8px) rotate(45deg);
    }

    #sidebar-toggle:checked~header .menu-btn span:nth-child(2) {
      opacity: 0;
    }

    #sidebar-toggle:checked~header .menu-btn span:nth-child(3) {
      transform: translateY(-8px) rotate(-45deg);
    }

    /* Sidebar Layout */
    .sidebar {
      position: fixed;
      top: 0;
      left: calc(-1 * var(--sidebar-width));
      width: var(--sidebar-width);
      height: 100vh;
      background: var(--surface-color);
      border-right: 1px solid var(--border-color);
      padding: 90px 24px 24px 24px;
      /* Padding top accounts for header/button space */
      box-shadow: var(--shadow-lg);
      transition: transform var(--transition-speed) ease-in-out;
      z-index: 200;
      /* Sidebar covers the header */
      overflow-y: auto;
    }

    #sidebar-toggle:checked~.sidebar {
      transform: translateX(var(--sidebar-width));
    }

    /* Mobile Backdrop Element */
    .sidebar-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(2px);
      z-index: 150;
      opacity: 0;
      visibility: hidden;
      transition: opacity var(--transition-speed), visibility var(--transition-speed);
      cursor: pointer;
    }

    /* Navigation Links */
    nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: 500;
      transition: background-color 0.2s, color 0.2s;
    }

    nav a:hover {
      background-color: var(--bg-color);
      color: var(--text-main);
    }

    nav a.active {
      color: var(--surface-color);
      background-color: var(--primary-color);
    }

    /* --- Responsive Search Bar --- */
    .search-container {
      position: relative;
      flex: 1;
      max-width: 400px;
      /* Limits size on desktop, shrinks on mobile */
      margin-left: 20px;
      /* Buffer from the menu button */
    }

    #search-input {
      width: 100%;
      padding: 10px 20px;
      font-size: 14px;
      color: var(--text-main);
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      /* Pill shape */
      transition: all 0.2s ease;
    }

    #search-input:focus {
      outline: none;
      border-color: var(--primary-color);
      background-color: var(--surface-color);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    /* Refined Floating Results */
    .search-results-list {
      position: absolute;
      top: calc(100% + 12px);
      right: 0;
      width: 100%;
      min-width: 300px;
      max-height: 400px;
      overflow-y: auto;
      background: var(--surface-color);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      /* Match input curves */
      padding: 8px;
      /* Inner spacing for floating items */
      box-shadow: var(--shadow-lg);
      list-style: none;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: opacity 0.2s, transform 0.2s, visibility 0.2s;
      z-index: 110;
    }

    .search-results-list.has-results {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .search-results-list li {
      margin-bottom: 4px;
    }

    .search-results-list li:last-child {
      margin-bottom: 0;
    }

    .search-results-list a {
      display: block;
      padding: 12px 16px;
      text-decoration: none;
      color: var(--text-main);
      border-radius: 10px;
      /* Inner rounded corners on hover */
      transition: background-color 0.2s;
    }

    .search-results-list a:hover {
      background-color: var(--bg-color);
    }

    .search-results-list .result-title {
      font-weight: 600;
      color: var(--primary-color);
      display: block;
      font-size: 14px;
    }

    .search-results-list .result-snippet {
      font-size: 12px;
      color: var(--text-muted);
      display: block;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-results-list .no-results {
      padding: 16px;
      color: var(--text-muted);
      text-align: center;
      font-size: 14px;
    }

    mark {
      background-color: #fef08a;
      color: #854d0e;
      padding: 0 2px;
      border-radius: 4px;
    }

    /* --- Smart Layout Shifting --- */
    main {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 24px;
      transition: transform var(--transition-speed) ease-in-out;
    }

    pre {
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      background: var(--surface-color);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-sm);
      margin: 20px 0;
    }

    /* Desktop View: Push the main page */
    @media (min-width: 769px) {
      #sidebar-toggle:checked~main {
        transform: translateX(calc(var(--sidebar-width) / 2));
      }
    }

    /* Mobile View: Show backdrop overlay instead of pushing */
    @media (max-width: 768px) {
      #sidebar-toggle:checked~.sidebar-backdrop {
        opacity: 1;
        visibility: visible;
      }

      .search-results-list {
        position: fixed;
        top: 80px;
        left: 16px;
        right: 16px;
        width: auto;
        min-width: 0;
      }
    }
  </style>
</head>

<body>

  <input type="checkbox" id="sidebar-toggle">
  <label for="sidebar-toggle" class="sidebar-backdrop"></label>

  <header>
    <label for="sidebar-toggle" class="menu-btn">
      <span></span>
      <span></span>
      <span></span>
    </label>

    <div class="search-container">
      <input type="text" id="search-input" placeholder="Search pages...">
      <ul id="search-results" class="search-results-list"></ul>
    </div>
  </header>

  <aside class="sidebar">
    <nav>
      <a href="{{ '/' | relative_url }}" class="{% if page.url == '/' %}active{% endif %}">Home</a>
      <a href="{{ '/setup.html' | relative_url }}" class="{% if page.url == '/setup.html' %}active{% endif %}">Setup</a>
      <a href="{{ '/instructions.html' | relative_url }}"
        class="{% if page.url == '/instructions.html' %}active{% endif %}">Instructions</a>
      <a href="{{ '/summary.html' | relative_url }}"
        class="{% if page.url == '/summary.html' %}active{% endif %}">Summary</a>
      <a href="{{ '/description.html' | relative_url }}"
        class="{% if page.url == '/description.html' %}active{% endif %}">Description</a>
    </nav>
  </aside>

  <main>
    {{ content }}
  </main>

  <script>
    async function initSearch() {
      const input = document.getElementById('search-input');
      const resultsContainer = document.getElementById('search-results');
      if (!input || !resultsContainer) return;

      try {
        const response = await fetch("{{ '/search.json' | relative_url }}");
        const searchIndex = await response.json();

        input.addEventListener('input', (e) => {
          const query = e.target.value.toLowerCase().trim();
          resultsContainer.innerHTML = '';

          if (query.length < 2) {
            resultsContainer.classList.remove('has-results');
            return;
          }

          const matches = searchIndex.filter(page => {
            const title = page.title ? page.title.toLowerCase() : '';
            const content = page.content ? page.content.toLowerCase() : '';
            return title.includes(query) || content.includes(query);
          });

          resultsContainer.classList.add('has-results');

          if (matches.length === 0) {
            resultsContainer.innerHTML = '<li class="no-results">No results found</li>';
            return;
          }

          matches.forEach(page => {
            const li = document.createElement('li');

            let snippet = page.content || '';
            const idx = snippet.toLowerCase().indexOf(query);
            if (idx !== -1) {
              const start = Math.max(0, idx - 30);
              const end = Math.min(snippet.length, idx + 60);
              snippet = (start > 0 ? '...' : '') + snippet.slice(start, end) + (end < snippet.length ? '...' : '');
            } else {
              snippet = snippet.slice(0, 80) + '...';
            }

            const regex = new RegExp(`(${query})`, 'gi');
            const highlightedTitle = (page.title || 'Untitled Page').replace(regex, '<mark>$1</mark>');
            const highlightedSnippet = snippet.replace(regex, '<mark>$1</mark>');

            li.innerHTML = `
              <a href="${page.url}">
                <span class="result-title">${highlightedTitle}</span>
                <span class="result-snippet">${highlightedSnippet}</span>
              </a>
            `;
            resultsContainer.appendChild(li);
          });
        });

        // Hide search results when clicking away or hitting Escape
        document.addEventListener('click', (e) => {
          if (!e.target.closest('.search-container')) {
            resultsContainer.classList.remove('has-results');
          }
        });
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') {
            resultsContainer.classList.remove('has-results');
            input.blur();
          }
        });

      } catch (err) {
        console.error("Failed to initialize search engine index:", err);
      }
    }
    initSearch();
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
</body>

</html>
