<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-coy.min.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      color: #333;
      background-color: #fafafa;
    }

    /* Make sure code blocks look nice and scroll horizontally on mobile */
    pre {
      padding: 15px;
      border-radius: 6px;
      overflow-x: auto;
    }

    nav {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #ddd;
    }

    nav a {
      color: #0066cc;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    nav a.active {
      color: #ffffff;
      background-color: #0066cc;
      font-weight: bold;
      text-decoration: none;
    }

    .search-container {
      margin: 20px 0;
    }

    #search-input {
      width: 100%;
      padding: 8px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .search-results-list {
      list-style: none;
      padding: 0;
    }

    .search-results-list li {
      margin: 10px 0;
    }

    hr {
      border: 0;
      border-top: 1px solid #ddd;
      margin: 20px 0;
    }
  </style>
</head>

<body>
  <nav>
    <a href="{{ '/' | relative_url }}" class="{% if page.url == '/' %}active{% endif %}">Home</a>
    <a href="{{ '/setup.html' | relative_url }}" class="{% if page.url == '/setup.html' %}active{% endif %}">Setup</a>
    <a href="{{ '/instructions.html' | relative_url }}"
      class="{% if page.url == '/instructions.html' %}active{% endif %}">Instructions</a>
    <a href="{{ '/summary.html' | relative_url }}"
      class="{% if page.url == '/summary.html' %}active{% endif %}">Summary</a>
    <a href="{{ '/description.html' | relative_url }}"
      class="{% if page.url == '/description.html' %}active{% endif %}">Description</a>
  </nav>

  <div class="search-container">
    <input type="text" id="search-input" placeholder="Search pages...">
    <ul id="search-results" class="search-results-list"></ul>
  </div>

  <main>
    {{ content }}
  </main>

  <script>
    async function initSearch() {
      const input = document.getElementById('search-input');
      const resultsContainer = document.getElementById('search-results');
      if (!input) return;

      const response = await fetch("{{ '/search.json' | relative_url }}");
      const searchIndex = await response.json();

      input.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        resultsContainer.innerHTML = '';

        if (query.length < 2) return;

        const matches = searchIndex.filter(page => {
          const title = page.title ? page.title.toLowerCase() : '';
          const content = page.content ? page.content.toLowerCase() : '';
          return title.includes(query) || content.includes(query);
        });

        if (matches.length === 0) {
          resultsContainer.innerHTML = '<li>No results found</li>';
          return;
        }

        matches.forEach(page => {
          const li = document.createElement('li');
          li.innerHTML = `<a href="${page.url}">${page.title || 'Untitled Page'}</a>`;
          resultsContainer.appendChild(li);
        });
      });
    }
    initSearch();
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
</body>

</html>
